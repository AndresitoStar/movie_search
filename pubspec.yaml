name: movie_search
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 2.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  go_router: ^17.0.1
  # DI
  get_it: ^9.2.0
  injectable: ^2.5.0
  # Riverpod
  riverpod: ^3.0.3
  flutter_riverpod: ^3.0.3
  flutter_hooks: ^0.21.2
  hooks_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  # API Client Use
  dio: ^5.8.0+1
  retrofit: ^4.4.0
  # UI
  carousel_slider: ^5.0.0
  cached_network_image: ^3.4.1
  flex_color_scheme: ^8.1.1
  google_fonts: ^6.2.1
  responsive_sizer: ^3.3.1
  font_awesome_flutter: ^10.4.0
  panara_dialogs: ^0.1.2
  url_launcher: ^6.3.2
  intl: ^0.20.2
  day_night_themed_switch: ^1.0.0
  reactive_forms: ^18.2.0
  package_info_plus:
  # Core
  shared_preferences: ^2.5.3
  # Firebase
  firebase_core: any
  firebase_auth: ^6.0.2
  google_sign_in: ^7.2.0
  firebase_database: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: 2.10.4
  json_serializable:
  retrofit_generator: 10.2.0

  injectable_generator:
  riverpod_generator:
  custom_lint:
  riverpod_lint:
  flutter_lints:
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  ios: true
  remove_alpha_ios: true
  android: "launcher_icon"
  image_path: "assets/images/ic_launcher.png"
  adaptative_icon_background: "background.png"
  min_sdk_android: 21
  macos:
    generate: true
    image_path: "assets/images/ic_launcher.png"
#    background_color: "#hexcode"
#    theme_color: "#hexcode"


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/fonts/
  #  - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:

  fonts:
    - family: Dosis
      fonts:
        - asset: assets/fonts/Dosis-Bold.ttf
        - asset: assets/fonts/Dosis-Book.ttf
        - asset: assets/fonts/Dosis-ExtraBold.ttf
        - asset: assets/fonts/Dosis-ExtraLight.ttf
        - asset: assets/fonts/Dosis-Light.ttf
        - asset: assets/fonts/Dosis-Medium.ttf
        - asset: assets/fonts/Dosis-SemiBold.ttf

    #    - family: FrinoIcons
    #      fonts:
    #        - asset: assets/fonts/FrinoIcons.ttf
    - family: FrinoIcons
      fonts:
      - asset: assets/fonts/FrinoIcons.ttf
  #      - asset: fonts/Schyler-Italic.ttf
  #        style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
