name: movie_search
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 2.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.9
  go_router: ^17.2.1
  # DI
  get_it: ^9.2.1
  injectable: ^2.7.1+4
  # Riverpod
  riverpod: ^3.2.1
  flutter_riverpod: ^3.3.1
  flutter_hooks: ^0.21.3+1
  hooks_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  # API Client Use
  dio: ^5.9.2
  retrofit: ^4.9.2
  # UI
  carousel_slider: ^5.1.2
  cached_network_image: ^3.4.1
  flex_color_scheme: ^8.4.0
  google_fonts: ^8.0.2
  responsive_sizer: ^3.3.1
  font_awesome_flutter: ^11.0.0
  panara_dialogs: ^0.1.5
  url_launcher: ^6.3.2
  intl: ^0.20.2
  day_night_themed_switch: ^1.0.0
  reactive_forms: ^18.2.2
  package_info_plus: ^10.0.0
  # Core
  shared_preferences: ^2.5.5
  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: ^7.2.0
  firebase_database: ^12.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.13.1
  json_serializable: ^6.11.4
  retrofit_generator: ^10.2.5

  injectable_generator: ^2.12.1
  riverpod_generator: ^4.0.3
  # custom_lint: ^0.8.1
  riverpod_lint: ^3.1.3
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  ios: true
  remove_alpha_ios: true
  android: "launcher_icon"
  image_path: "assets/images/ic_launcher.png"
  adaptative_icon_background: "background.png"
  min_sdk_android: 21
  macos:
    generate: true
    image_path: "assets/images/ic_launcher.png"
  windows:
    generate: true
    image_path: "assets/images/ic_launcher.png"
#    background_color: "#hexcode"
#    theme_color: "#hexcode"


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/fonts/
  #  - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:

  fonts:
    - family: Dosis
      fonts:
        - asset: assets/fonts/Dosis-Bold.ttf
        - asset: assets/fonts/Dosis-Book.ttf
        - asset: assets/fonts/Dosis-ExtraBold.ttf
        - asset: assets/fonts/Dosis-ExtraLight.ttf
        - asset: assets/fonts/Dosis-Light.ttf
        - asset: assets/fonts/Dosis-Medium.ttf
        - asset: assets/fonts/Dosis-SemiBold.ttf

    #    - family: FrinoIcons
    #      fonts:
    #        - asset: assets/fonts/FrinoIcons.ttf
    - family: FrinoIcons
      fonts:
      - asset: assets/fonts/FrinoIcons.ttf
  #      - asset: fonts/Schyler-Italic.ttf
  #        style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
