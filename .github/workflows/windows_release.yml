name: Build Windows Release and Create GitHub Release
on:
  workflow_dispatch:

jobs:
  build-windows-release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Zip Windows build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath movie_search_windows.zip

      - name: Upload Windows zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-zip
          path: movie_search_windows.zip

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: movie_search_windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
